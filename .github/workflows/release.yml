name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  iso_build:
    name: Build ISO
    runs-on: ubuntu-latest

    steps:
      - name: Build Arch Linux ISO
        run: |
          docker run --rm --privileged \
            --volume "$GITHUB_WORKSPACE:/workspace" \
            --workdir /workspace \
            archlinux:latest \
            bash -euxo pipefail -c '
              pacman -Syu --noconfirm archiso
              mkarchiso \
                -r \
                -m iso \
                -p git \
                -o /workspace/out \
                /usr/share/archiso/configs/releng

              mv /workspace/out/*.iso /workspace/arch_linux.iso
            '

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v7
        with:
          name: arch-linux-iso
          path: arch_linux.iso
          if-no-files-found: error

  source_code_archive:
    name: Archive source code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create source code archive
        run: |
          git archive \
            --format=tar.gz \
            --output=source_code.tar.gz \
            HEAD

      - name: Upload source code archive
        uses: actions/upload-artifact@v7
        with:
          name: source-code
          path: source_code.tar.gz
          if-no-files-found: error

  ventoy_injection:
    name: Ventoy injection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate ventoy injection archive
        run: |
          git clone --depth 1 https://github.com/ventoy/LiveInjection.git
          cp -a ventoy/sysroot/. LiveInjection/sysroot/
          (
            cd LiveInjection
            sh pack.sh
          )

      - name: Upload ventoy files
        uses: actions/upload-artifact@v7
        with:
          name: ventoy-files
          path: |
            ventoy/ventoy.json
            LiveInjection/live_injection.tar.gz
          if-no-files-found: error

  release:
    name: Publish release
    if: github.ref_type == 'tag'
    needs:
      - iso_build
      - source_code_archive
      - ventoy_injection
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/arch_linux.iso
            release-assets/source_code.tar.gz
            release-assets/ventoy.json
            release-assets/live_injection.tar.gz

$font = Monospace

general {
    ignore_empty_input = true
    immediate_render = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor = eDP-1
    path = $HOME/.config/hypr/wallpaper.jpg
    blur_passes = 2
}

input-field {
    monitor = eDP-1
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0) 

    outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
    check_color = rgba(00ff99ee) rgba(ff6633ee) 120deg
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg

    font_color = rgb(143, 143, 143)
    fade_on_empty = false
    rounding = 15

    font_family = $font
    placeholder_text = Input password...
    fail_text = $PAMFAIL

    dots_spacing = 0.3

    position = 0, -60
    halign = center
    valign = center
}

label {
    monitor = eDP-1
    text = $TIME 
    font_size = 90
    font_family = $font

    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor = eDP-1
    text = cmd[update:60000] date +"%A, %d %B %Y" 
    font_size = 25
    font_family = $font

    position = 0, 20
    halign = center
    valign = center
}

label {
    monitor = eDP-1
    text = $LAYOUT[en,ru]
    font_size = 23
    onclick = hyprctl switchxkblayout all next

    position = 240, -60
    halign = center
    valign = center
}

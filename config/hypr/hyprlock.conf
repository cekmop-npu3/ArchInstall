$font = "JetBrainsMono Nerd Font"

general {
    ignore_empty_input = true
    immediate_render = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor = 
    path = $HOME/.config/hypr/wallpaper.jpg
    blur_passes = 2
}

input-field {
    monitor = 
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0) 

    outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
    check_color = rgba(00ff99ee) rgba(ff6633ee) 120deg
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg

    font_color = rgb(143, 143, 143)
    fade_on_empty = false
    rounding = 15

    font_family = $font
    placeholder_text = Input password...
    fail_text = $PAMFAIL

    dots_spacing = 0.3

    position = 0, -5.6%
    halign = center
    valign = center
}

label {
    monitor = 
    text = <b>$TIME</b>
    font_size = 90
    font_family = $font

    position = 0, 11.1%
    halign = center
    valign = center
}

label {
    monitor = 
    text = cmd[update:60000] date +"<b>%A, %d %B %Y</b>"
    font_size = 25
    font_family = $font

    position = 0, 1.9%
    halign = center
    valign = center
}

label {
    monitor = 
    text = <b>$LAYOUT[en,ru]</b>
    font_size = 23
    onclick = hyprctl switchxkblayout all next

    position = 12.5%, -5.6%
    halign = center
    valign = center
}
